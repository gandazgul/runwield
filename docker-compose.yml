services:
    runwield-plan-server:
        build:
            context: .
            dockerfile: Dockerfile
        image: runwield-plan-server:local
        restart: unless-stopped
        environment:
            RUNWIELD_REMOTE_HOST: 0.0.0.0
            RUNWIELD_REMOTE_PORT: "8080"
            RUNWIELD_REMOTE_DB_PATH: /data/runwield-shared-spaces.sqlite
        ports:
            - "8080:8080"
        volumes:
            - runwield-plan-server-data:/data
        healthcheck:
            test:
                - CMD
                - deno
                - run
                - --allow-net=127.0.0.1:8080
                - "data:application/typescript,const%20r%20%3D%20await%20fetch(%22http%3A%2F%2F127.0.0.1%3A8080%2Fhealthz%22)%3B%20if%20(!r.ok)%20Deno.exit(1)%3B"
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

volumes:
    runwield-plan-server-data:
