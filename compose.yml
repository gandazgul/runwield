services:
    runwield-plan-server:
        build:
            context: .
            dockerfile: Containerfile
        image: runwield-plan-server:local
        restart: unless-stopped
        environment:
            RUNWIELD_REMOTE_HOST: 0.0.0.0
            RUNWIELD_REMOTE_PORT: "8080"
            RUNWIELD_REMOTE_DB_PATH: /data/runwield-shared-spaces.sqlite
            RUNWIELD_REMOTE_MAX_REQUEST_BYTES: "5242880"
            # Set RUNWIELD_REMOTE_RETENTION_DAYS=7 for an accountless public instance behind a rate-limiting proxy.
        ports:
            - "127.0.0.1:8080:8080"
        volumes:
            - runwield-plan-server-data:/data
        healthcheck:
            test:
                - CMD-SHELL
                - printf 'const r = await fetch("http://127.0.0.1:8080/readyz"); if (!r.ok) Deno.exit(1);' | deno run --allow-net=127.0.0.1:8080 -
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

volumes:
    runwield-plan-server-data:
