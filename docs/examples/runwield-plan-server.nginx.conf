# RunWield Plan Server reverse-proxy baseline.
#
# This file is intended to be included inside an operator-managed TLS server.
# RunWield serves plain HTTP on loopback; Nginx or an equivalent proxy owns
# certificates, public exposure, request limits, and rate limits.
#
# Example placement:
#   http { include /path/to/runwield-plan-server.nginx.conf; }
# Then adapt the server block to your own TLS listener and server_name.

limit_req_zone $binary_remote_addr zone=runwield_plan_server_api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=runwield_plan_server_create:10m rate=6r/m;
limit_req_status 429;

upstream runwield_plan_server {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name plans.example.com;

    # Keep this in sync with RUNWIELD_REMOTE_MAX_REQUEST_BYTES.
    client_max_body_size 5m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /api/spaces {
        limit_req zone=runwield_plan_server_create burst=3 nodelay;
        proxy_pass http://runwield_plan_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/ {
        limit_req zone=runwield_plan_server_api burst=30 nodelay;
        proxy_pass http://runwield_plan_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    location / {
        limit_req zone=runwield_plan_server_api burst=60 nodelay;
        proxy_pass http://runwield_plan_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }
}
