name: "deno-lint"
version: 2
description: "Suppress successful deno lint output while preserving failures"

match:
    command: "deno"
    subcommand: "lint"

streams:
    - stdout
    - stderr

pipeline:
    - action: "match_output"
      pattern: "(?m)^Checked [0-9]+ files?$"
      unless: "(?i)(error|warning|Found [1-9][0-9]* problems?|problem|failed)"
      message: "no lint errors"
    - action: "on_empty"
      message: "no lint errors"

on_error: "passthrough"

tests:
    - name: "empty output means success"
      input: ""
      expected: |
          no lint errors
    - name: "lint success is summarized"
      input: |
          Checked 2 files
      expected: |
          no lint errors
    - name: "lint error passes through unchanged"
      input: |
          error[no-unused-vars]: `value` is never used
            --> /repo/src/file.js:1:7
             |
           1 | const value = 1;
             |       ^^^^^
          Found 1 problem
      expected: |
          error[no-unused-vars]: `value` is never used
            --> /repo/src/file.js:1:7
             |
           1 | const value = 1;
             |       ^^^^^
          Found 1 problem
