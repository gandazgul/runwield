name: "deno-fmt"
version: 2
description: "Suppress successful deno fmt output while preserving failures"

match:
    command: "deno"
    subcommand: "fmt"

streams:
    - stdout
    - stderr

pipeline:
    - action: "match_output"
      pattern: "(?s).+"
      unless: "(?i)(error:|Found [1-9][0-9]* not formatted|not formatted|failed)"
      message: "all files formatted"
    - action: "on_empty"
      message: "all files formatted"

on_error: "passthrough"

tests:
    - name: "empty output means success"
      input: ""
      expected: |
          all files formatted
    - name: "check success is summarized"
      input: |
          Checked 2 files
      expected: |
          all files formatted
    - name: "format success with changed paths is summarized"
      input: |
          /repo/src/file.js
          Checked 2 files
      expected: |
          all files formatted
    - name: "check failure passes through unchanged"
      input: |
          /repo/src/file.js
          Checked 2 files
          error: Found 1 not formatted file in 2 files
      expected: |
          /repo/src/file.js
          Checked 2 files
          error: Found 1 not formatted file in 2 files
