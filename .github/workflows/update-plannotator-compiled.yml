name: update-plannotator-compiled

on:
    schedule:
        - cron: "17 7 * * *"
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: update-plannotator-compiled
    cancel-in-progress: false

env:
    PACKAGE_NAME: "@gandazgul/plannotator-pi-extension-compiled"

jobs:
    update:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Check latest package version
              id: versions
              run: |
                  set -euo pipefail

                  if ! latest="$(npm view "$PACKAGE_NAME" version)"; then
                    echo "has_update=false" >> "$GITHUB_OUTPUT"
                    echo "Could not read latest $PACKAGE_NAME version from npm; skipping this run."
                    exit 0
                  fi

                  package_import_present="$(
                    node --input-type=module <<'NODE'
                  import fs from "node:fs";

                  const denoJson = JSON.parse(fs.readFileSync("deno.json", "utf8"));
                  const spec = denoJson.imports?.["@gandazgul/plannotator-pi-extension-compiled"];
                  console.log(spec ? "true" : "false");
                  NODE
                  )"

                  if [ "$package_import_present" != "true" ]; then
                    echo "has_update=false" >> "$GITHUB_OUTPUT"
                    echo "@gandazgul/plannotator-pi-extension-compiled is not imported in deno.json; skipping this run."
                    exit 0
                  fi

                  current="$(
                    node --input-type=module <<'NODE'
                  import fs from "node:fs";

                  const denoJson = JSON.parse(fs.readFileSync("deno.json", "utf8"));
                  const spec = denoJson.imports["@gandazgul/plannotator-pi-extension-compiled"];
                  const match = spec.match(/@gandazgul\/plannotator-pi-extension-compiled@\^?([^/]+)/);
                  if (!match) {
                    throw new Error(`Could not parse current Plannotator compiled version from ${spec}`);
                  }

                  console.log(match[1]);
                  NODE
                  )"

                  echo "current=$current" >> "$GITHUB_OUTPUT"
                  echo "latest=$latest" >> "$GITHUB_OUTPUT"

                  if [ "$current" = "$latest" ]; then
                    echo "has_update=false" >> "$GITHUB_OUTPUT"
                    echo "Already on latest $latest"
                    exit 0
                  fi

                  if ! npm view "$PACKAGE_NAME@$latest" version >/dev/null; then
                    echo "has_update=false" >> "$GITHUB_OUTPUT"
                    echo "Latest $PACKAGE_NAME version $latest is not available yet; skipping this run."
                    exit 0
                  fi

                  availability_lock="${RUNNER_TEMP:-/tmp}/plannotator-availability.lock"
                  if ! deno info --minimum-dependency-age=0 --lock "$availability_lock" "npm:$PACKAGE_NAME@$latest" >/dev/null; then
                    echo "has_update=false" >> "$GITHUB_OUTPUT"
                    echo "Latest $PACKAGE_NAME version $latest is not resolvable by Deno yet; skipping this run."
                    exit 0
                  fi

                  echo "has_update=true" >> "$GITHUB_OUTPUT"
                  echo "Update available: $current -> $latest"

            - name: Update deno.json
              if: steps.versions.outputs.has_update == 'true'
              env:
                  LATEST_VERSION: ${{ steps.versions.outputs.latest }}
              run: |
                  set -euo pipefail

                  node --input-type=module <<'NODE'
                  import fs from "node:fs";

                  const filePath = "deno.json";
                  const packageName = "@gandazgul/plannotator-pi-extension-compiled";
                  const latest = process.env.LATEST_VERSION;
                  const denoJson = JSON.parse(fs.readFileSync(filePath, "utf8"));

                  const importKeys = [
                    packageName,
                    `${packageName}/server`,
                    `${packageName}/assets`,
                  ];

                  for (const key of importKeys) {
                    if (!denoJson.imports?.[key]) {
                      throw new Error(`Missing ${key} import in ${filePath}`);
                    }

                    const subpath = key.slice(packageName.length);
                    denoJson.imports[key] = `npm:${packageName}@^${latest}${subpath}`;
                  }

                  fs.writeFileSync(filePath, `${JSON.stringify(denoJson, null, 4)}\n`);
                  NODE

            - name: Generate version file
              if: steps.versions.outputs.has_update == 'true'
              run: deno run --allow-run --allow-read --allow-write scripts/write-version.js

            - name: Update deno.lock
              if: steps.versions.outputs.has_update == 'true'
              run: deno cache --minimum-dependency-age=0 --reload=npm:@gandazgul/plannotator-pi-extension-compiled src/cli.js

            - name: Commit updated dependency
              if: steps.versions.outputs.has_update == 'true'
              env:
                  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
                  LATEST_VERSION: ${{ steps.versions.outputs.latest }}
              run: |
                  set -euo pipefail

                  if git diff --quiet -- deno.json deno.lock; then
                    echo "No dependency file changes after update"
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add deno.json deno.lock
                  git commit \
                    -m "chore(deps): update plannotator compiled to ${LATEST_VERSION}" \
                    -m "Automated by .github/workflows/update-plannotator-compiled.yml."
                  git push origin "HEAD:${DEFAULT_BRANCH}"
